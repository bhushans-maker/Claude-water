name: aqua_alarm
description: Smart Water Reminder - Stay Hydrated!
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # Background Alarm (works even when app is killed)
  android_alarm_manager_plus: ^3.0.4

  # Notifications with Full-Screen Intent
  flutter_local_notifications: ^17.2.1

  # Audio playback for alarm tunes
  audioplayers: ^6.1.0

  # Vibration
  vibration: ^2.0.0

  # Persistent storage
  shared_preferences: ^2.3.2

  # Beautiful charts
  fl_chart: ^0.68.0

  # State management
  provider: ^6.1.2

  # Permissions
  permission_handler: ^11.3.1

  # Timezone support
  timezone: ^0.9.4
  flutter_timezone: ^2.0.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/images/
